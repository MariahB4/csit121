<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Practice</title>
    <style>
        /* Requirement #5: page colors and fonts */
        body {
            background-color: #eaeaea;
            color: #000033;
            font-family: Arial, Verdana, sans-serif;
            margin: 40px;
        }

        /* Requirement #2: Internal Heading Styles */
        h1 {
            color: brown;
            font-size: 2em;
            /* Responsive: hugs text but won't exceed screen width */
            max-width: fit-content; 
        }

        /* Requirement #7: Styled List */
        ul {
            background-color: pink;
            padding: 20px 20px 20px 40px; 
            border-left: 10px solid #f06292; /* My faaaave horizontial line */
            list-style-type: square;
            border-radius: 0 8px 8px 0;
            /* Responsive width */
            max-width: fit-content; 
        }

        #one:link { color: red; }
        #two:link { color: green; }
        a:hover { color: orange; }
    </style>
</head>
<body>

    <h1>My Semi-Ugly CSS Text and Color Playground</h1>

    <p style="color: white; background-color: green; padding: 10px; max-width: fit-content;">
        This is my first paragraph for the hands-on activity.
    </p>

    <p style="background-color: blue; color: white; text-indent: 2em; padding: 10px; max-width: fit-content;">
        This is the second paragraph. I've used a max-width to shorten the block 
        as the professor suggested, rather than changing the display type!
    </p>
  
    <ul>
        <li><a id="one" href="https://www.w3schools.com/css/default.asp">W3Schools CSS</a></li>
        <li><a id="two" href="https://developer.mozilla.org/en-US/docs/Web/CSS">MDN Web Docs</a></li>
        <li><a href="https://css-tricks.com/">CSS-Tips N Tricks</a></li>
    </ul>

</body>
</html>
